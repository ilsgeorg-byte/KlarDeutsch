# Docker Compose для KlarDeutsch
# Запуск Redis и PostgreSQL для локальной разработки

version: '3.8'

services:
  # Redis для кэширования
  redis:
    image: redis:7-alpine
    container_name: klardeutsch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - klardeutsch-network

  # PostgreSQL для основных данных
  postgres:
    image: postgres:15-alpine
    container_name: klardeutsch-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: klardeutsch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - klardeutsch-network

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  klardeutsch-network:
    driver: bridge
